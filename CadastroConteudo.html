<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Conteúdo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/stylesheet.css" type="text/css">

</head>
<body class="bg-all">

    <div class="container-login-cadastro">
        <form action="#" method="post"> 
            <!-- <input type="hidden" name="id_cadastro" value=""> -->
            <label for="nome"> Nome do Conteúdo</label>
            <input type="text" id="nome" name="nome_conteudo" required>
            
            <label for="categoria"> Categoria</label>
            
            <select id="categoria" name="categoria" required>
                <option value="">Selecione...</option>
                <option value="Filme">Filme</option>
                <option value="Serie">Serie</option>
                <option value="Musica">Musica</option>
            </select>

            <label for="Descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="5"
            placeholder="Descreva o conteúdo aqui..." maxlength="500"></textarea> 
            <small>Máximo 500 caracteres</small>

            

            <button type="submit" class="btn btn-primary">Salvar Conteúdo</button>
        </form> 
    
    </div>

</body>
</html>
