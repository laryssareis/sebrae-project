<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/stylesheet.css" type="text/css">

</head>

<body>

    <div class="hero">

        <!--IMAGEM PRINCIPAL-->

        <img src="../img/friendsHead.avif" class="img-fluid" alt="This is a cover of the TV series Friends where the characters are sitting in front of a fountain">

    </div>
    <!--DESIGN DO TÍTULO DO SITE -->

    <h1 class="friends_title">

        <!--THE-->
        T<span class="dot red"></span>h<span class="dot yellow"></span>e

        <!--ONE-->
        o<span class="dot blue"></span>n<span class="dot red"></span>e

        <!--WHERE-->
        w<span class="dot yellow"></span>h<span class="dot blue"></span>e<span class="dot yellow"></span>r<span
            class="dot red"></span>e

        <!--YOU-->
        y<span class="dot blue"></span>o<span class="dot yellow"></span>u <br>

        <!--MASTER-->
        m<span class="dot yellow"></span>a<span class="dot red"></span>s<span class="dot yellow"></span>t<span
            class="dot red"></span>e<span class="dot blue"></span>r

        <!--ENGLISH-->
        e<span class="dot red"></span>n<span class="dot blue"></span>g<span class="dot yellow"></span>l<span
            class="dot red"></span>i<span class="dot yellow"></span>s<span class="dot blue"></span>h
    </h1>

        <div class="btn-group-vertical" role="group">
            
            <input type="radio" class="btn-check" name="season" id="s1" checked>
            <label class="btn season-btn" for="s1">Season 1</label>

        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>

</html>
