<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/stylesheet.css" type="text/css">
    <link rel="icon" href="img/logo-morrow.png" type="image/png">

    <title>Login</title>
</head>
<body class="bg-all">
    
    <!--Utilizar method="POST" para enviar dados sensíveis, e method="GET" para dados que podem ser acessados diretamente pela URL-->
    
    <div class="container-login-cadastro">
        <form action="#" method="post">
           
            <label for="email">Email:</label>
           <input type="email" id="email" name="email" required>

           <label for="senha">Senha:</label>
           <input type="password" id="senha" name="senha" required>

           <button type="submit" class="btn btn-primary"><a href="index.html">Entrar</a></button>

           <p>Ainda não tem cadastro? <a href="cadastro.html">Cadastre-se</a>
            </p>

        </form>

    </div>
</body>
</html>
